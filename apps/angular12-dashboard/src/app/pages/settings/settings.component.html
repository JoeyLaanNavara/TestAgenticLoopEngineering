<h1>Settings</h1>

<div class="card">
  <h2>User Preferences</h2>
  <form [formGroup]="form" (ngSubmit)="save()">
    <div class="field">
      <label for="name">Name</label>
      <input id="name" type="text" formControlName="name" />
      <span *ngIf="form.get('name')?.invalid && form.get('name')?.touched" class="error">
        Name is required (min 2 characters).
      </span>
    </div>

    <div class="field">
      <label for="email">Email</label>
      <input id="email" type="email" formControlName="email" />
      <span *ngIf="form.get('email')?.invalid && form.get('email')?.touched" class="error">
        Valid email is required.
      </span>
    </div>

    <div class="field">
      <label>
        <input type="checkbox" formControlName="notifications" />
        Enable email notifications
      </label>
    </div>

    <button type="submit">Save Changes</button>
    <span *ngIf="saved" class="success-msg">Settings saved!</span>
  </form>
</div>
